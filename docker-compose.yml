services:
  core:
    build:
      context: .
      dockerfile: apps/core/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GOWA_BASE_URL=http://whatsapp:8080
      - GOWA_DEVICE_ID=${GOWA_DEVICE_ID}
      - GOWA_WEBHOOK_SECRET=${GOWA_WEBHOOK_SECRET}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - core-network

  whatsapp:
    image: aldinokemal2104/go-whatsapp-web-multidevice:latest
    ports:
      - "8080:3000"
    command:
      - rest
      - --debug=true
    restart: unless-stopped
    networks:
      - core-network

networks:
  core-network:
    driver: bridge

services:
  core:
    build:
      context: .
      dockerfile: apps/core/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - apps/core/.env
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://chatkasir:chatkasir@postgres:5432/chatkasir}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - GOWA_BASE_URL=http://whatsapp:3000
      - GOWA_DEVICE_ID=${GOWA_DEVICE_ID}
      - GOWA_WEBHOOK_SECRET=${GOWA_WEBHOOK_SECRET}
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - core-network

  postgres:
    image: postgres:18
    container_name: chatkasir-postgres
    environment:
      POSTGRES_USER: chatkasir
      POSTGRES_PASSWORD: chatkasir
      POSTGRES_DB: chatkasir
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatkasir -d chatkasir"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - core-network

  whatsapp:
    image: aldinokemal2104/go-whatsapp-web-multidevice:latest
    container_name: chatkasir-whatsapp
    ports:
      - "8080:3000"
    env_file:
      - apps/core/.env
    command:
      - rest
      - --debug=true
      - --port=3000
      - --webhook=http://core:8000/api/v1/webhook/gowa
      - --webhook-secret=${GOWA_WEBHOOK_SECRET}
      - --webhook-events=message
    environment:
      - PORT=3000
      - WEBHOOK=http://core:8000/api/v1/webhook/gowa
      - WEBHOOK_SECRET=${GOWA_WEBHOOK_SECRET}
      - WEBHOOK_EVENTS=message
    restart: unless-stopped
    networks:
      - core-network

volumes:
  postgres-data:

networks:
  core-network:
    driver: bridge

llm:
  provider: "openai"
  model: "gpt-5.4-mini"
  base_url: "https://api.openai.com/v1"
  temperature: 0.3
  max_tokens: 4096
  timeout: 120

mem0:
  persistence_enabled: false
  limit: 10

server:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 1

logging:
  level: "INFO"
  format: "json"

jwt:
  algorithm: "HS256"
  expire_hours: 24

cors:
  origins:
    - "http://localhost:3001"

rag:
  enabled: true
  qdrant_url: "http://localhost:6333"
  qdrant_api_key: ""
  collection_name: "documents"
  embedding_model: "BAAI/bge-small-en-v1.5"
  chunk_size: 500
  chunk_overlap: 50

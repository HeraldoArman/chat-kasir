llm:
  provider: "deepinfra"
  model: "deepseek-ai/DeepSeek-V4-Flash"
  base_url: "https://api.deepinfra.com/v1/openai"
  temperature: 0.7
  max_tokens: 4096
  timeout: 120

mem0:
  persistence_enabled: false
  limit: 10

server:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 1

logging:
  level: "INFO"
  format: "json"
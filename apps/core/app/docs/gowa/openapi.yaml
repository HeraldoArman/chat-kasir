          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInternalServer'

  # Chatwoot API
  / integrations / chatwoot / login:
    post:
      operationId: chatwootLogin
      tags:
        - chatwoot
      summary: Chatwoot Login
      description: Authenticate with Chatwoot and store credentials
      parameters:
        - $ref: '#/components/parameters/DeviceIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                base_url:
                  type: string
                  example: 'https://app.chatwoot.com'
                  description: Chatwoot server URL
                api_key:
                  type: string
                  example: 'your-api-key'
                  description: Chatwoot API key
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInternalServer'
  / integrations / chatwoot / account:
    get:
      operationId: chatwootAccount
      tags:
        - chatwoot
      summary: Get Chatwoot Account
      description: Get connected Chatwoot account information
      parameters:
        - $ref: '#/components/parameters/DeviceIdHeader'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatwootAccountResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInternalServer'
  / integrations / chatwoot / conversation:
    post:
      operationId: chatwootConversation
      tags:
        - chatwoot
      summary: Create Chatwoot Conversation
      description: Create or get existing Chatwoot conversation
      parameters:
        - $ref: '#/components/parameters/DeviceIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                inbox_id:
                  type: string
                  example: '1'
                  description: Chatwoot inbox ID
                phone:
                  type: string
                  example: '6289685028129'
                  description: Customer phone number
                direction:
                  type: string
                  enum:
                    - incoming
                    - outgoing
                  example: 'incoming'
                  description: Message direction
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatwootConversationResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInternalServer'
  / integrations / chatwoot / message:
    post:
      operationId: chatwootMessage
      tags:
        - chatwoot
      summary: Send Chatwoot Message
      description: Send message via Chatwoot
      parameters:
        - $ref: '#/components/parameters/DeviceIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                  example: '1'
                  description: Chatwoot conversation ID
                content:
                  type: string
                  example: 'Hello!'
                  description: Message content
                private:
                  type: boolean
                  example: false
                  description: Whether this is a private note
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInternalServer'
  / integrations / chatwoot / webhook:
    post:
      operationId: chatwootWebhook
      tags:
        - chatwoot
      summary: Chatwoot Webhook
      description: Receive messages from Chatwoot
      parameters:
        - $ref: '#/components/parameters/DeviceIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hook:
                  type: string
                  example: 'message.created'
                  description: Event type
                conversation_id:
                  type: integer
                  example: 1
                  description: Conversation ID
                contact:
                  type: object
                  description: Contact information
                message:
                  type: object
                  description: Message content
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInternalServer'

components:
  parameters:
    DeviceIdHeader:
      name: X-Device-Id
      in: header
      schema:
        type: string
      description: Device ID (e.g., 6289685028129@s.whatsapp.net)

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  schemas:
    LoginResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        code:
          type: string
          example: SUCCESS
        message:
          type: string
          example: Success
        results:
          type: object
          properties:
            qr_code:
              type: string
              example: data:image/png;base64,...

    LoginWithCodeResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        code:
          type: string
          example: SUCCESS
        message:
          type: string
          example: Success
        results:
          type: object
          properties:
            pairing_code:
              type: string
              example: '123-456-789'

    GenericResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        code:
          type: string
          example: SUCCESS
        message:
          type: string
          example: Success

    ErrorInternalServer:
      type: object
      properties:
        status:
          type: integer
          example: 500
        code:
          type: string
          example: ERROR
        message:
          type: string
          example: Internal Server Error

    ErrorBadRequest:
      type: object
      properties:
        status:
          type: integer
          example: 400
        code:
          type: string
          example: BAD_REQUEST
        message:
          type: string
          example: Bad Request

    ErrorNotFound:
      type: object
      properties:
        status:
          type: integer
          example: 404
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: Not Found

    DeviceResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        code:
          type: string
          example: SUCCESS
        message:
          type: string
          example: Success
        results:
          type: array
          items:
            type: string
          example: ['6289685028129@s.whatsapp.net']

    DeviceListResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        code:
          type: string
          example: SUCCESS
        message:
          type: string
          example: Success
        results:
          type: array
          items:
            $ref: '#/components/schemas/DeviceInfo'

    DeviceAddResponse:

          type: string
          example: SUCCESS
        message:
          type: string
          example: Success
        results:
          type: object
          properties:
            device_id:
              type: string

    DeviceInfo:
      type: object
      properties:
        device_id:
          type: string
          example: '6289685028129@s.whatsapp.net'
        is_connected:
          type: boolean
        is_login:
          type: boolean
        platform:
          type: string
          example: 'android'
        name:
          type: string

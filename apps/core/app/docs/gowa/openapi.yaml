      description: Returns all active chats with pagination and sorting
      parameters:
        - $ref: '#/components/parameters/DeviceIdHeader'
        - name: search:
          in: query
          schema:
            type: string
          description: Search term to filter chats by name or participant
        - name: is_group:
          in: query
          schema:
            type: boolean
          description: Filter by chat type (true = groups only)
        - name: is_community:
          in: query
          schema:
            type: boolean
          description: Filter by community type
        - name: cursor:
          in: query
          schema:
            type: string
          description: Pagination cursor for loading more chats
        - name: limit:
          in: query
          schema:
            type: integer
            default: 100
          description: Number of chats to return (max 500)
        - name: order_by:
          in: query
          schema:
            type: string
            enum:
              - chat漾@user
              - chat_update_timestamp
              - size
          description: Field to order by (default chat_update_timestamp desc)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatListResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
